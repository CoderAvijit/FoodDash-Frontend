<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="220" fill="#ffffff" opacity="0.08"/>
  <circle cx="120" cy="560" r="200" fill="#ffffff" opacity="0.08"/>

  <!-- logo badge -->
  <g transform="translate(90,90)">
    <rect width="96" height="96" rx="26" fill="url(#badge)"/>
    <g transform="translate(28,26)" fill="none" stroke="#ea580c" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2 L3 6 V20 a2 2 0 0 0 2 2 H19 a2 2 0 0 0 2 -2 V6 l-3 -4 z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10 a4 4 0 0 1 -8 0"/>
    </g>
  </g>
  <text x="210" y="158" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff">GalliEats</text>

  <!-- headline -->
  <text x="90" y="340" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="76" font-weight="800" fill="#ffffff">Order home-style food</text>
  <text x="90" y="430" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="76" font-weight="800" fill="#ffedd5">from your galli.</text>

  <!-- subline -->
  <text x="92" y="510" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="32" font-weight="500" fill="#ffffff" opacity="0.92">Nearby kitchens · live ETA · pay by UPI/QR or cash</text>
</svg>
